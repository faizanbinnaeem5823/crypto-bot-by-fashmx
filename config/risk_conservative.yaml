    daily_cap_pct: 1.5
    weekly_cap_pct: 4.0
    monthly_cap_pct: 8.0
    max_drawdown_kill_pct: 20.0
    position_sizing: fixed_fractional

  experimental:
    per_trade_risk_pct: 0.3
    daily_cap_pct: 1.0
    weekly_cap_pct: 3.0
    monthly_cap_pct: 6.0
    max_drawdown_kill_pct: 20.0
