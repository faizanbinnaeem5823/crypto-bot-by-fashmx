# =============================================================================
# Crypto Trading Bot - Dual Bot Architecture
# =============================================================================
# Bot A: Conservative (15m-4h timeframe)
# Bot B: Experimental (5m-15m timeframe)
# Infrastructure: Postgres 16, Redis 7, Prometheus, Grafana, Loki
# =============================================================================

version: "3.9"

# ---------------------------------------------------------------------------
# Services
# ---------------------------------------------------------------------------
services:
  # =========================================================================
  # Bot A - Conservative Trading Bot (15m-4h timeframe)
  # =========================================================================
  bot-a:
    image: freqtradeorg/freqtrade:stable
    container_name: cryptobot-bot-a
    hostname: bot-a
    restart: unless-stopped
    environment:
      - BOT_ID=bot_a
      - BOT_TIMEFRAME_BAND=15m-4h
      - RECONCILIATION_INTERVAL_SEC=60
      - DB_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - REDIS_URL=redis://redis:6379/0
      - FREQTRADE__API_SERVER__LISTEN_PORT=8080
      - FREQTRADE__API_SERVER__ENABLED=true
      - FREQTRADE__API_SERVER__JWT_SECRET_KEY=${JWT_SECRET_KEY:?err}
    volumes:
      - ./config:/freqtrade/user_data/config:ro
      - ./src:/freqtrade/user_data/src:ro
      - ./secrets:/freqtrade/user_data/secrets:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "127.0.0.1:8081:8080"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/api/v1/ping')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512m
    networks:
      - cryptobot
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service"
        tag: "{{.ImageName}}|{{.Name}}|{{.ImageFullID}}|{{.FullID}}"

  # =========================================================================
  # Bot B - Experimental Trading Bot (5m-15m timeframe)
  # =========================================================================
  bot-b:
    image: freqtradeorg/freqtrade:stable
    container_name: cryptobot-bot-b
    hostname: bot-b
    restart: unless-stopped
    environment:
      - BOT_ID=bot_b
      - BOT_TIMEFRAME_BAND=5m-15m
      - RECONCILIATION_INTERVAL_SEC=60
      - DB_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - REDIS_URL=redis://redis:6379/0
      - FREQTRADE__API_SERVER__LISTEN_PORT=8080
      - FREQTRADE__API_SERVER__ENABLED=true
      - FREQTRADE__API_SERVER__JWT_SECRET_KEY=${JWT_SECRET_KEY:?err}
    volumes:
      - ./config:/freqtrade/user_data/config:ro
      - ./src:/freqtrade/user_data/src:ro
      - ./secrets:/freqtrade/user_data/secrets:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "127.0.0.1:8082:8080"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/api/v1/ping')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512m
    networks:
      - cryptobot
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service"
        tag: "{{.ImageName}}|{{.Name}}|{{.ImageFullID}}|{{.FullID}}"

  # =========================================================================
  # PostgreSQL 16 - Persistent State Storage
  # =========================================================================
  postgres:
    image: postgres:16-alpine
    container_name: cryptobot-postgres
    hostname: postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER:?err}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?err}
      - POSTGRES_DB=${POSTGRES_DB:-cryptobot}
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256m
    networks:
      - cryptobot
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # =========================================================================
  # Redis 7 - Caching & Messaging Layer
  # =========================================================================
  redis:
    image: redis:7-alpine
    container_name: cryptobot-redis
    hostname: redis
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
      --requirepass ${REDIS_PASSWORD:?err}
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD:?err}
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 156m
    networks:
      - cryptobot
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # =========================================================================
  # Prometheus - Metrics Collection
  # =========================================================================
  prometheus:
    image: prom/prometheus:latest
    container_name: cryptobot-prometheus
    hostname: prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
      - "--web.enable-lifecycle"
      - "--log.level=info"
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "127.0.0.1:9090:9090"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:9090/-/healthy || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 256m
    networks:
      - cryptobot
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # =========================================================================
  # Grafana - Visualization Dashboards
  # =========================================================================
  grafana:
    image: grafana/grafana:latest
    container_name: cryptobot-grafana
    hostname: grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD:?err}
      - GF_USERS_DEFAULT_THEME=dark
      - GF_SERVER_ROOT_URL=http://localhost:3000
      - GF_LOG_MODE=console
      - GF_LOG_LEVEL=info
      - GF_PATHS_PROVISIONING=/etc/grafana/provisioning
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_SECURITY_ANGULAR_SUPPORT_ENABLED=false
      - GF_FEATURE_TOGGLES_ENABLE=publicDashboards
    volumes:
      - grafana_data:/var/lib/grafana
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/api/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 256m
    networks:
      - cryptobot
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # =========================================================================
  # Loki - Log Aggregation
  # =========================================================================
  loki:
    image: grafana/loki:latest
    container_name: cryptobot-loki
    hostname: loki
    restart: unless-stopped
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - ./docker/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    ports:
      - "127.0.0.1:3100:3100"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3100/ready || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 256m
    networks:
      - cryptobot
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # =========================================================================
  # Dashboard - Streamlit Analytics UI
  # =========================================================================
  dashboard:
    build:
      context: .
      dockerfile: docker/Dockerfile.dashboard
    container_name: cryptobot-dashboard
    hostname: dashboard
    restart: unless-stopped
    command: >
      streamlit run src/dashboard/app.py
      --server.port=8501
      --server.address=0.0.0.0
      --server.headless=true
      --server.enableCORS=false
      --server.maxUploadSize=5
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${POSTGRES_DB:-cryptobot}
      - DB_USER=${POSTGRES_USER:?err}
      - DB_PASSWORD=${POSTGRES_PASSWORD:?err}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:?err}
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
      - STREAMLIT_BROWSER_GATHER_USAGE_STATS=false
    ports:
      - "127.0.0.1:8501:8501"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512m
    networks:
      - cryptobot
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# ---------------------------------------------------------------------------
# Named Volumes
# ---------------------------------------------------------------------------
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  duckdb_data:
    driver: local
  grafana_data:
    driver: local
  prometheus_data:
    driver: local
  loki_data:
    driver: local

# ---------------------------------------------------------------------------
# Networks
# ---------------------------------------------------------------------------
networks:
  cryptobot:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24