# =============================================================================
# Loki Configuration - Log Aggregation for Crypto Trading Bot
# =============================================================================
# Features:
#   - Auth disabled (internal network only)
#   - BoltDB Shipper for index storage
#   - Filesystem object store for chunks
#   - 30-day log retention via compactor
# =============================================================================

auth_enabled: false

# ---------------------------------------------------------------------------
# Server Configuration
# ---------------------------------------------------------------------------
server:
  http_listen_port: 3100
  grpc_listen_port: 9096
  log_level: info
  log_format: json
  http_server_read_timeout: 30s
  http_server_write_timeout: 30s
  http_server_idle_timeout: 120s

# ---------------------------------------------------------------------------
# Distributor
# ---------------------------------------------------------------------------
distributor:
  ring:
    kvstore:
      store: inmemory
    replication_factor: 1

# ---------------------------------------------------------------------------
# Ingester
# ---------------------------------------------------------------------------
ingester:
  lifecycler:
    address: 127.0.0.1
    ring:
      kvstore:
        store: inmemory
      replication_factor: 1
    final_sleep: 0s
  chunk_idle_period: 5m
  chunk_retain_period: 30s
  max_transfer_retries: 0
  wal:
    enabled: true
    dir: /loki/wal
    checkpoint_duration: 5m
    replay_memory_ceiling: 64MB
  chunk_target_size: 1048576
  chunk_encoding: snappy

# ---------------------------------------------------------------------------
# Storage Schema
# ---------------------------------------------------------------------------
schema_config:
  configs:
    - from: 2024-01-01
      store: boltdb-shipper
      object_store: filesystem
      schema: v12
      index:
        prefix: index_
        period: 24h

# ---------------------------------------------------------------------------
# Storage
# ---------------------------------------------------------------------------
storage_config:
  boltdb_shipper:
    active_index_directory: /loki/boltdb-shipper-active
    cache_location: /loki/boltdb-shipper-cache
    cache_ttl: 24h
    shared_store: filesystem
  filesystem:
    directory: /loki/chunks

# ---------------------------------------------------------------------------
# Chunk Store
# ---------------------------------------------------------------------------
chunk_store_config:
  max_look_back_period: 720h

# ---------------------------------------------------------------------------
# Table Manager
# ---------------------------------------------------------------------------
table_manager:
  retention_deletes_enabled: true
  retention_period: 720h

# ---------------------------------------------------------------------------
# Compactor
# ---------------------------------------------------------------------------
compactor:
  working_directory: /loki/compactor
  shared_store: filesystem
  compaction_interval: 10m
  retention_enabled: true
  retention_delete_delay: 2h
  retention_delete_worker_count: 150
  delete_request_cancel_period: 24h

# ---------------------------------------------------------------------------
# Limits
# ---------------------------------------------------------------------------
limits_config:
  ingestion_rate_mb: 10
  ingestion_burst_size_mb: 20
  per_stream_rate_limit: 5MB
  per_stream_rate_limit_burst: 20MB
  max_global_streams_per_user: 5000
  max_chunks_per_query: 200000
  max_query_length: 720h
  max_query_parallelism: 32
  cardinality_limit: 100000
  retention_period: 720h
  reject_old_samples: true
  reject_old_samples_max_age: 168h
  deletion_mode: filter-and-delete
  allow_structured_metadata: true

# ---------------------------------------------------------------------------
# Frontend
# ---------------------------------------------------------------------------
frontend:
  max_outstanding_per_tenant: 2048
  compress_responses: true

frontend_worker:
  grpc_client_config:
    max_send_msg_size: 104857600
    max_recv_msg_size: 104857600

# ---------------------------------------------------------------------------
# Query Scheduler
# ---------------------------------------------------------------------------
query_scheduler:
  max_outstanding_requests_per_tenant: 2048

# ---------------------------------------------------------------------------
# Querier
# ---------------------------------------------------------------------------
querier:
  max_concurrent: 10
  query_ingesters_within: 3h

# ---------------------------------------------------------------------------
# Query Range
# ---------------------------------------------------------------------------
query_range:
  split_queries_by_interval: 15m
  cache_results: true
  results_cache:
    cache:
      enable_fifocache: true
      fifocache:
        max_size_bytes: 500MB
        validity: 1h

# ---------------------------------------------------------------------------
# Ruler
# ---------------------------------------------------------------------------
ruler:
  storage:
    type: local
    local:
      directory: /loki/rules
  rule_path: /loki/rules-temp
  alertmanager_url: http://localhost:9093
  ring:
    kvstore:
      store: inmemory
  enable_api: true
  enable_alertmanager_v2: true

# ---------------------------------------------------------------------------
# Analytics
# ---------------------------------------------------------------------------
analytics:
  reporting_enabled: false

# ---------------------------------------------------------------------------
# Common
# ---------------------------------------------------------------------------
common:
  compactor_address: http://localhost:3100
  path_prefix: /loki